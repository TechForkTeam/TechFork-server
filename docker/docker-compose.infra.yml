services:
  mysql:
    image: mysql:8.0
    container_name: techfork-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=techblog
      - MYSQL_USER=techfork
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - TZ=Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=2G
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      techfork-network:
        aliases:
          - mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: techfork-redis
    restart: always
    ports:
      - "6379:6379"
    command:
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
      --rename-command KEYS ""
      --rename-command FLUSHALL ""
      --rename-command FLUSHDB ""
    volumes:
      - redis-data:/data
    networks:
      techfork-network:
        aliases:
          - redis

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.18.0
    container_name: techfork-elasticsearch
    hostname: techfork-elasticsearch
    restart: always
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - node.name=techfork-elasticsearch
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms8g -Xmx8g"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      techfork-network:
        aliases:
          - elasticsearch
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  nginx:
    image: nginx:stable-alpine
    container_name: techfork-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      techfork-network:
        aliases:
          - nginx

networks:
  techfork-network:
    external: true

volumes:
  mysql-data:
  redis-data:
  elasticsearch-data:
