spring:
  application:
    name: TechFork
  profiles:
    default: local-tunnel
  config:
    import: optional:file:.env
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-3-5-haiku-20241022
          temperature: 0.3
          max-tokens: 8192
    openai:
      api-key: ${OPENAI_API_KEY}
      timeout: 60
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.3
          max-tokens: 8192
  devtools:
    restart:
      enabled: false
  batch:
    jdbc:
      initialize-schema: always
    job:
      names: ''
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_REST_API_KEY}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope:
              - openid
              - account_email
              - profile_image
            client-name: Kakao
          apple:
            client-id: ${APPLE_CLIENT_ID}
            client-secret: dummy-will-be-replaced-at-runtime
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope:
              - openid
              - email
            client-name: Apple
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            jwk-set-uri: https://kauth.kakao.com/.well-known/jwks.json
            user-name-attribute: sub
          apple:
            authorization-uri: https://appleid.apple.com/auth/authorize?response_mode=form_post
            token-uri: https://appleid.apple.com/auth/token
            jwk-set-uri: https://appleid.apple.com/auth/keys
            user-name-attribute: sub

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 180000  # 15분 -> 3분(테스트 임시)(밀리초) 
  refresh-token-expiration: 1209600000  # 14일 (밀리초)
  redirect-uri: ${JWT_REDIRECT_URI:http://localhost:5173/auth/callback?registered=%s&token=%s&email=%s}
  login-failure-redirect-uri: ${JWT_LOGIN_FAILURE_REDIRECT_URI:http://localhost:5173/login?error=true}

apple:
  team-id: ${APPLE_TEAM_ID}
  key-id: ${APPLE_KEY_ID}
  private-key-path: ${APPLE_PRIVATE_KEY_PATH:keys/AppleAuthKey.p8}

server:
  domain: ${SERVER_DOMAIN:localhost}
  forward-headers-strategy: native



scheduler:
  enabled: true

webhook:
  enabled: true
  discord:
    url: ${DISCORD_WEBHOOK_URL}

recommendation:
  knn-search-size: 100
  num-candidates: 200
  mmr-final-size: 30
  lambda: 0.95
  active-user-hours: 24
  # 임베딩 가중치 설정 (합계 1.0)
  embedding-weights:
    title: 0.5      # 제목 중요도 50%
    summary: 0.5    # 요약 중요도 50%
    content: 0.0    # 콘텐츠 청크 중요도 0% (제외)
  # 시간 감쇠 가중치 설정
  time-decay:
    days-7: 1.3      # 최근 7일: +30%
    days-30: 1.0     # 최근 30일: 변화 없음
    days-90: 0.7     # 최근 90일: -30%
    days-over: 0.4   # 90일 이상: -60%

# Resilience4j 설정 (LLM API 호출용)
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 60
        slow-call-rate-threshold: 70
        slow-call-duration-threshold: 45s
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - com.techfork.global.llm.exception.LlmException
        ignore-exceptions:
          - com.techfork.global.llm.exception.LlmNetworkException
          - com.techfork.global.llm.exception.LlmRateLimitException

  ratelimiter:
    configs:
      default:
        limit-for-period: 37
        limit-refresh-period: 1m
        timeout-duration: 10s
    instances:
      llmSummary:
        base-config: default
        # OpenAI gpt-4o-mini: 500 RPM, 200k TPM
        # Summary: 평균 4350 tokens/req → ~46 req/min
        # 안전 마진 20% 적용: 37 req/min
        limit-for-period: 37
        limit-refresh-period: 1m
        timeout-duration: 15s
      llmEmbedding:
        base-config: default
        # OpenAI text-embedding-3-large: 3k RPM, 1M TPM
        # 계산: 1,000,000 / 1350 ≈ 740 req/min
        # 안전 마진 20% 적용: 590 req/min
        limit-for-period: 590
        limit-refresh-period: 1m
        timeout-duration: 5s

  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        exponential-max-wait-duration: 10s
        retry-exceptions:
          - com.techfork.global.llm.exception.LlmNetworkException
          - com.techfork.global.llm.exception.LlmRateLimitException

---
spring:
  config:
    activate:
      on-profile: local
---
spring:
  config:
    activate:
      on-profile: local-tunnel
---
spring:
  config:
    activate:
      on-profile: dev
