spring:
  application:
    name: TechFork
  profiles:
    default: local-tunnel
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-3-5-haiku-20241022
          temperature: 0.3
          max-tokens: 8192
    openai:
      api-key: ${OPENAI_API_KEY}
      timeout: 60
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.3
          max-tokens: 8192

# Resilience4j 설정 (LLM API 호출용)
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 60
        slow-call-rate-threshold: 70
        slow-call-duration-threshold: 45s
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - com.techfork.global.llm.exception.LlmException
        ignore-exceptions:
          - com.techfork.global.llm.exception.LlmNetworkException
          - com.techfork.global.llm.exception.LlmRateLimitException

  ratelimiter:
    configs:
      default:
        limit-for-period: 37
        limit-refresh-period: 1m
        timeout-duration: 10s
    instances:
      llmSummary:
        base-config: default
        # OpenAI gpt-4o-mini: 500 RPM, 200k TPM
        # Summary: 평균 4350 tokens/req → ~46 req/min
        # 안전 마진 20% 적용: 37 req/min
        limit-for-period: 37
        limit-refresh-period: 1m
        timeout-duration: 15s
      llmEmbedding:
        base-config: default
        # OpenAI text-embedding-3-large: 3k RPM, 1M TPM
        # 계산: 1,000,000 / 1350 ≈ 740 req/min
        # 안전 마진 20% 적용: 590 req/min
        limit-for-period: 590
        limit-refresh-period: 1m
        timeout-duration: 5s

  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        exponential-max-wait-duration: 10s
        retry-exceptions:
          - com.techfork.global.llm.exception.LlmNetworkException
          - com.techfork.global.llm.exception.LlmRateLimitException

---
spring:
  config:
    activate:
      on-profile: local
---
spring:
  config:
    activate:
      on-profile: local-tunnel
---
spring:
  config:
    activate:
      on-profile: dev