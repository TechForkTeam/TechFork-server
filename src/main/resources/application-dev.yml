spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      # 풀 크기
      maximum-pool-size: 20
      minimum-idle: 20
      # 타임아웃
      connection-timeout: 5000
      max-lifetime: 1800000
      # 커넥션 유효성
      keepalive-time: 60000
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    properties:
      hibernate:
        show_sql: false  # 로깅으로만 출력 (중복 방지)
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD}
      timeout: 3s
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 0
          max-wait: 5s
  elasticsearch:
    uris: http://elasticsearch:9200

logging:
  file:
    path: /app/logs

apple:
  private-key-path: /app/keys/AuthKey_${APPLE_KEY_ID}.p8