spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: false  # 로깅으로만 출력 (중복 방지)
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD}
      timeout: 3s
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 0
          max-wait: 5s
  elasticsearch:
    uris: http://elasticsearch:9200

scheduler:
  enabled: true

webhook:
  enabled: true
  discord:
    url: ${DISCORD_WEBHOOK_URL:}

recommendation:
  knn-search-size: 100
  num-candidates: 200
  mmr-final-size: 30
  lambda: 0.3
  active-user-hours: 24
  # 임베딩 가중치 설정 (합계 1.0)
  embedding-weights:
    title: 0.2
    summary: 0.2
    content: 0.6
  # 시간 감쇠 가중치 설정
  time-decay:
    days-7: 1.3      # 최근 7일: +30%
    days-30: 1.0     # 최근 30일: 변화 없음
    days-90: 0.7     # 최근 90일: -30%
    days-over: 0.4   # 90일 이상: -60%

logging:
  level:
    com.techfork: INFO
    org.springframework.batch: INFO
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: WARN