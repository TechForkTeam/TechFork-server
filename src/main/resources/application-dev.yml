spring:
  application:
    name: TechFork

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 20000

    jpa:
      hibernate:
        ddl-auto: create
      properties:
        hibernate:
          show_sql: true
          format_sql: true
          highlight_sql: true
          use_sql_comments: true
          dialect: org.hibernate.dialect.MySQL8Dialect
          jdbc:
            batch_size: 20

    data:
      redis:
        host: localhost
        port: 6379
        password: ${REDIS_PASSWORD}
        timeout: 3s
        lettuce:
          pool:
            max-active: 16
            max-idle: 8
            min-idle: 0
            max-wait: 5s

server:
  domain: ${DOMAIN_NAME}