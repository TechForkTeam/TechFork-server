spring:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
  batch:
    jdbc:
      initialize-schema: never
    job:
      names: ''

  ai:
    anthropic:
      api-key: test-dummy-key
      chat:
        options:
          model: claude-3-5-haiku-20241022
          temperature: 0.3
          max-tokens: 8192
    openai:
      api-key: test-dummy-key
      timeout: 60
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.3
          max-tokens: 8192

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: test-kakao-client-id
            client-secret: test-kakao-client-secret
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope:
              - openid
              - account_email
            client-name: Kakao
          apple:
            client-id: test-apple-client-id
            client-secret: dummy-will-be-replaced-at-runtime
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope:
              - openid
              - email
            client-name: Apple
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            jwk-set-uri: https://kauth.kakao.com/.well-known/jwks.json
            user-name-attribute: sub
          apple:
            authorization-uri: https://appleid.apple.com/auth/authorize?response_mode=form_post
            token-uri: https://appleid.apple.com/auth/token
            jwk-set-uri: https://appleid.apple.com/auth/keys
            user-name-attribute: sub

apple:
  team-id: test-team-id
  key-id: test-key-id
  private-key-path: keys/test-key.p8

jwt:
  secret: test-jwt-secret-key-for-integration-test-must-be-at-least-256-bits
  access-token-expiration: 900000  # 15분 (밀리초)
  refresh-token-expiration: 1209600000  # 14일 (밀리초)
  redirect-uri: http://localhost:5173/auth/callback?registered=%s&token=%s&email=%s
  login-failure-redirect-uri: http://localhost:5173/login?error=true

server:
  domain: localhost

scheduler:
  enabled: false

webhook:
  enabled: false
  discord:
    url: http://test-webhook-url

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 60
        slow-call-rate-threshold: 70
        slow-call-duration-threshold: 45s
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - com.techfork.global.llm.exception.LlmException
        ignore-exceptions:
          - com.techfork.global.llm.exception.LlmNetworkException
          - com.techfork.global.llm.exception.LlmRateLimitException

  ratelimiter:
    configs:
      default:
        limit-for-period: 60
        limit-refresh-period: 1m
        timeout-duration: 10s
    instances:
      llmSummary:
        base-config: default
        limit-for-period: 60
        limit-refresh-period: 1m
        timeout-duration: 15s
      llmEmbedding:
        base-config: default
        limit-for-period: 590
        limit-refresh-period: 1m
        timeout-duration: 5s

  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        exponential-max-wait-duration: 10s
        retry-exceptions:
          - com.techfork.global.llm.exception.LlmNetworkException
          - com.techfork.global.llm.exception.LlmRateLimitException

logging:
  level:
    com.techfork: DEBUG
    org.springframework.batch: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.tool.schema: ERROR
