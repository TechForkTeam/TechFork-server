version: '3.8'

services:
  # MySQL (개발용)
  mysql:
    image: mysql:8.0
    container_name: techfork-mysql-local
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: techblog
      MYSQL_USER: techfork
      MYSQL_PASSWORD: techfork1234
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - techfork-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: techfork-redis-local
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis1234
    volumes:
      - redis-data:/data
    networks:
      - techfork-network

  # Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.18.0
    container_name: techfork-elasticsearch-local
    restart: always
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - TZ=Asia/Seoul
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - techfork-network
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  kibana:
    image: kibana:8.18.0
    container_name: kibana
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./kibana.local.yml:/usr/share/kibana/config/kibana.local.yml:ro
    networks:
      - techfork-network

networks:
  techfork-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  elasticsearch-data: